# Nginx reverse proxy for Luxury Dental Lugano
# Place at /etc/nginx/sites-available/luxurydental.conf on VPS
# Symlink: ln -s /etc/nginx/sites-available/luxurydental.conf /etc/nginx/sites-enabled/

upstream nextjs_app {
    server app:3005;
    keepalive 64;
}

upstream whatsapp_agent {
    server whatsapp-agent:3010;
    keepalive 16;
}

# ── HTTP → HTTPS redirect ────────────────────────────────────────────────────
server {
    listen 80;
    listen [::]:80;
    server_name YOUR_DOMAIN.com www.YOUR_DOMAIN.com;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ── HTTPS main app ───────────────────────────────────────────────────────────
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name YOUR_DOMAIN.com www.YOUR_DOMAIN.com;

    # Certbot managed certs
    ssl_certificate     /etc/letsencrypt/live/YOUR_DOMAIN.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/YOUR_DOMAIN.com/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # Security headers
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    add_header X-Content-Type-Options    "nosniff" always;
    add_header X-Frame-Options           "SAMEORIGIN" always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy        "camera=(), microphone=(), geolocation=()" always;

    # Logging
    access_log /var/log/nginx/luxurydental_access.log;
    error_log  /var/log/nginx/luxurydental_error.log;

    # Max upload size (documents)
    client_max_body_size 20M;

    # Compression
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml image/svg+xml;
    gzip_min_length 1000;
    gzip_proxied any;

    # WhatsApp webhook (proxied to agent service)
    location /api/webhook/whatsapp {
        proxy_pass         http://whatsapp_agent;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
    }

    # Next.js static assets — long cache
    location /_next/static/ {
        proxy_pass         http://nextjs_app;
        proxy_http_version 1.1;
        proxy_cache_valid  200 365d;
        add_header         Cache-Control "public, max-age=31536000, immutable";
        proxy_set_header   Host $host;
    }

    # Public media
    location /images/ {
        proxy_pass         http://nextjs_app;
        proxy_http_version 1.1;
        add_header         Cache-Control "public, max-age=86400";
        proxy_set_header   Host $host;
    }

    # Everything else → Next.js
    location / {
        proxy_pass         http://nextjs_app;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;
    }
}
